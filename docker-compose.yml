version: '3.8'

services:

  # ─────────────────────────────────────
  # Zookeeper (requis par Kafka)
  # ─────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sunu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sunu-network

  # ─────────────────────────────────────
  # Kafka Broker
  # ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sunu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - sunu-network

  # ─────────────────────────────────────
  # Kafka UI (optionnel - visualiser les topics)
  # ─────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sunu-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sunu-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - sunu-network

  # ─────────────────────────────────────
  # MySQL - base parcel_db
  # ─────────────────────────────────────
  parcel-db:
    image: mysql:8.0
    container_name: sunu-parcel-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: parcel_db
      MYSQL_USER: parcel_user
      MYSQL_PASSWORD: parcel_pwd
    ports:
      - "3308:3306"
    volumes:
      - parcel-db-data:/var/lib/mysql
    networks:
      - sunu-network

networks:
  sunu-network:
    driver: bridge

volumes:
  parcel-db-data:
