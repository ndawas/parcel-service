spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parcel_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: ${PARCEL_DB_USER:root}
    password: ${PARCEL_DB_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Eureka - désactivé en dev pour simplifier
eureka:
  client:
    enabled: false
