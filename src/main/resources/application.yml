spring:
  application:
    name: parcel-service
  profiles:
    active: ${PARCEL_PROFILE:dev}
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: ${PARCEL_PORT:8083}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logs
logging:
  level:
    sn.edu.ept.parcel: DEBUG
    org.springframework.kafka: INFO
